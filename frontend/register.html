<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fachini - Cadastro</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/style.css?v=2">
</head>

<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1 class="auth-logo">FACCHINI</h1>
                <p class="auth-title">Crie sua conta</p>
            </div>

            <form id="registerForm" class="auth-form" method="POST" onsubmit="submitForm(event)">
                <div class="auth-input-group">
                    <label class="auth-label">Nome Completo</label>
                    <div class="auth-input-wrapper">
                        <i data-lucide="info" width="18" height="18"></i>
                        <input type="text" id="name" name="name" class="auth-input" placeholder="Seu nome" required>
                    </div>
                </div>

                <div class="auth-input-group">
                    <label class="auth-label">Usuário</label>
                    <div class="auth-input-wrapper">
                        <i data-lucide="user" width="18" height="18"></i>
                        <input type="text" id="username" name="username" class="auth-input"
                            placeholder="Escolha um usuário" required>
                    </div>
                </div>

                <div class="auth-input-group">
                    <label class="auth-label">Senha</label>
                    <div class="auth-input-wrapper">
                        <i data-lucide="lock" width="18" height="18"></i>
                        <input type="password" id="password" name="password" class="auth-input"
                            placeholder="Crie uma senha" required>
                    </div>
                </div>

                <button type="submit" class="btn-auth">
                    <i data-lucide="user-plus" width="20" height="20"></i>
                    Cadastrar
                </button>
            </form>

            <div class="auth-footer">
                Já tem uma conta? <a href="login.html" class="auth-link">Faça Login</a>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast">
        <i data-lucide="check-circle" width="18" height="18"></i>
        <span id="toastMsg">Cadastro realizado!</span>
    </div>

    <script src="js/auth.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>

</html>
